<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRAGYANAM</title>  <!-- Google Fonts -->  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Philosopher:wght@700&display=swap" rel="stylesheet">  <!-- Icon -->  <link rel="icon" href="logopng.webp">  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
      height: 100vh;
      overflow-x: hidden;
    }

    .page { display: none; padding: 20px; }
    .active { display: block; }

    /* Glass Card */
    .card {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      padding: 15px;
      margin: 10px 0;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    h1, h2 {
      font-family: 'Philosopher', serif;
      text-align: center;
      margin-bottom: 10px;
    }

    .logo {
      display: block;
      margin: 20px auto;
      width: 100px;
    }

    .quote {
      text-align: center;
      opacity: 0.8;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #00c6ff;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }

    /* Bottom Nav */
    .nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      background: #111;
      padding: 10px 0;
    }

    .nav button {
      background: none;
      color: white;
      border: none;
      font-size: 12px;
    }

    @media (max-width: 600px) {
      .logo { width: 80px; }
    }
  </style></head>
<body><!-- HOME --><div id="home" class="page active">
  <img src="logopng.webp" class="logo">
  <h1>PRAGYANAM</h1>
  <p class="quote">"ज्ञान ही शक्ति है — Knowledge is Power"</p>
</div><!-- NOTES --><div id="notes" class="page">
  <h2>Notes</h2>
  <div id="notesContent"></div>
</div><!-- VIDEOS --><div id="videos" class="page">
  <h2>Videos</h2>
  <div id="videoContent"></div>
</div><!-- NOTICE --><div id="notice" class="page">
  <h2>Notice Board</h2>
  <div class="card">No new notices yet.</div>
</div><!-- EXAM --><div id="exam" class="page">
  <h2>Mock Exams</h2>
  <div class="card">
    <p>Test your knowledge with quizzes</p>
    <button onclick="startQuiz()">Start Quiz</button>
  </div>
</div><!-- NAVIGATION --><div class="nav">
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('notes')">Notes</button>
  <button onclick="showPage('videos')">Videos</button>
  <button onclick="showPage('notice')">Notice</button>
  <button onclick="showPage('exam')">Exam</button>
</div><script>
  const subjects = [
    "Assamese",
    "English",
    "General Science",
    "General Mathematics",
    "Social Science"
  ];

  function generateContent(containerId) {
    const container = document.getElementById(containerId);
    let html = "";

    ["Class 9", "Class 10"].forEach(cls => {
      html += `<div class='card'><h3>${cls}</h3>`;

      ["Free", "Premium (Payable)"].forEach(type => {
        html += `<div class='card'><strong>${type}</strong>`;
        subjects.forEach(sub => {
          html += `<p>${sub}</p>`;
        });
        html += `</div>`;
      });

      html += `</div>`;
    });

    container.innerHTML = html;
  }

  generateContent("notesContent");
  generateContent("videoContent");

  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function startQuiz() {
    alert("Quiz feature coming soon!");
  }

  // Basic PWA Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
</script></body>
                       </html>
