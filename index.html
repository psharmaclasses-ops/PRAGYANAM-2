<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1e1b4b">
    <title>PRAGYANOM</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        .bg-mesh { background: radial-gradient(at 50% 0%, #1e1b4b 0%, #0f0a1e 100%); background-attachment: fixed; }
        .glass { background: rgba(30, 27, 75, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .gradient-text { background: linear-gradient(135deg, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Fixed visibility: All pages hidden except the one with .active */
        .page { display: none; }
        .page.active { display: block !important; }

        #premium-knob { transition: transform 0.3s ease; }
        .nav-item.active { color: #fbbf24; }
    </style>
</head>

<body class="bg-mesh text-slate-100 font-sans min-h-screen pb-24">

    <header class="fixed top-0 left-0 right-0 z-50 glass px-4 py-3">
        <div class="max-w-lg mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="logopng.webp" class="w-10 h-10 rounded-full border border-gold-400/30">
                <h1 class="font-bold gradient-text text-lg">PRAGYANOM</h1>
            </div>
            <i data-lucide="user" class="text-gold-400 w-6 h-6"></i>
        </div>
    </header>

    <div class="h-20"></div>

    <main class="max-w-lg mx-auto px-4">
        
        <section id="page-home" class="page active">
            <div class="text-center py-8">
                <img src="logopng.webp" class="w-28 h-28 mx-auto mb-4 rounded-full border-4 border-gold-400/20 shadow-2xl">
                <h2 class="text-3xl font-bold mb-2">Welcome Back, Scholar</h2>
                <p id="motivational-text" class="text-slate-400 italic h-6">"Start your journey today"</p>
            </div>

            <div class="grid grid-cols-3 gap-3 mb-8">
                <div class="glass-card rounded-2xl p-4 text-center">
                    <i data-lucide="book-open" class="w-5 h-5 mx-auto mb-1 text-indigo-400"></i>
                    <p class="text-xl font-bold">12</p>
                    <p class="text-[10px] text-slate-500">NOTES</p>
                </div>
                <div class="glass-card rounded-2xl p-4 text-center">
                    <i data-lucide="play-circle" class="w-5 h-5 mx-auto mb-1 text-gold-400"></i>
                    <p class="text-xl font-bold">8</p>
                    <p class="text-[10px] text-slate-500">VIDEOS</p>
                </div>
                <div class="glass-card rounded-2xl p-4 text-center">
                    <i data-lucide="target" class="w-5 h-5 mx-auto mb-1 text-emerald-400"></i>
                    <p class="text-xl font-bold">85%</p>
                    <p class="text-[10px] text-slate-500">SCORE</p>
                </div>
            </div>

            <div class="glass-card rounded-2xl p-4 mb-4">
                <h3 class="font-bold mb-2">Continue Learning</h3>
                <div class="flex items-center gap-4 bg-white/5 p-3 rounded-xl" onclick="navigateTo('notes')">
                    <div class="w-10 h-10 bg-indigo-500 rounded-lg flex items-center justify-center">
                        <i data-lucide="atom" class="text-white"></i>
                    </div>
                    <div>
                        <p class="text-sm font-bold">General Science</p>
                        <p class="text-xs text-slate-400">Chapter 5: Life Processes</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="page-notes" class="page">
            <h2 class="text-2xl font-bold mb-4">Study Notes</h2>
            <div id="notes-step-1" class="grid grid-cols-2 gap-4">
                <button onclick="selectClass(9)" class="glass-card p-6 rounded-2xl text-center">Class 9</button>
                <button onclick="selectClass(10)" class="glass-card p-6 rounded-2xl text-center">Class 10</button>
            </div>
            <div id="notes-step-2" class="hidden space-y-3">
                <button onclick="resetFlow()" class="text-slate-400 text-sm mb-2">← Change Class</button>
                <div id="subject-list" class="grid grid-cols-1 gap-2"></div>
            </div>
        </section>

        <section id="page-videos" class="page">
            <h2 class="text-2xl font-bold mb-4">Video Lessons</h2>
            <p class="text-slate-400">Coming soon in the next update!</p>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 glass py-3">
        <div class="max-w-lg mx-auto flex justify-around">
            <button onclick="navigateTo('home')" class="nav-item active flex flex-col items-center">
                <i data-lucide="home" class="w-6 h-6"></i>
                <span class="text-[10px]">HOME</span>
            </button>
            <button onclick="navigateTo('notes')" class="nav-item flex flex-col items-center">
                <i data-lucide="book-open" class="w-6 h-6"></i>
                <span class="text-[10px]">NOTES</span>
            </button>
            <button onclick="navigateTo('videos')" class="nav-item flex flex-col items-center">
                <i data-lucide="play-circle" class="w-6 h-6"></i>
                <span class="text-[10px]">VIDEOS</span>
            </button>
        </div>
    </nav>

    <script>
        const subs = ["Mathematics", "General Science", "English", "Assamese"];
        
        function navigateTo(page) {
            // Hide all
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // Show one
            const target = document.getElementById('page-' + page);
            if(target) target.classList.add('active');
            
            // Update icons
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            lucide.createIcons();
        }

        function selectClass(val) {
            document.getElementById('notes-step-1').classList.add('hidden');
            document.getElementById('notes-step-2').classList.remove('hidden');
            const list = document.getElementById('subject-list');
            list.innerHTML = '';
            subs.forEach(s => {
                list.innerHTML += `<button class="glass-card p-4 rounded-xl text-left flex justify-between">${s} <i data-lucide="chevron-right"></i></button>`;
            });
            lucide.createIcons();
        }

        function resetFlow() {
            document.getElementById('notes-step-1').classList.remove('hidden');
            document.getElementById('notes-step-2').classList.add('hidden');
        }

        // Initialize Icons
        window.onload = () => { lucide.createIcons(); };
    </script>
</body>
</html>
