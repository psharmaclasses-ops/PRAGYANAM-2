    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600;800&family=Rajdhani:wght@500;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #00d4ff;
            --secondary: #ff006e;
            --accent: #fb5607;
            --gold: #ffbe0b;
            --purple: #8338ec;
            --dark: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        
        .bg-animation span {
            position: absolute;
            width: 50px;
            height: 50px;
            background: var(--primary);
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.3;
            animation: float 15s infinite;
        }
        
        .bg-animation span:nth-child(1) { left: 10%; animation-delay: 0s; background: var(--primary); }
        .bg-animation span:nth-child(2) { left: 30%; animation-delay: 2s; background: var(--secondary); }
        .bg-animation span:nth-child(3) { left: 50%; animation-delay: 4s; background: var(--accent); }
        .bg-animation span:nth-child(4) { left: 70%; animation-delay: 6s; background: var(--gold); }
        .bg-animation span:nth-child(5) { left: 90%; animation-delay: 8s; background: var(--purple); }
        
        @keyframes float {
            0%, 100% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) scale(2); opacity: 0; }
        }
        
        /* Header & Logo */
        .header {
            text-align: center;
            padding: 40px 20px;
            position: relative;
        }
        
        .logo-container {
            position: relative;
            display: inline-block;
            width: 150px;
            height: 150px;
            margin-bottom: 30px;
        }
        
        .logo-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid transparent;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 3s linear infinite;
        }
        
        .logo-ring:nth-child(2) {
            width: 120%;
            height: 120%;
            top: -10%;
            left: -10%;
            border-top-color: var(--secondary);
            animation: spin 4s linear infinite reverse;
        }
        
        .logo-ring:nth-child(3) {
            width: 140%;
            height: 140%;
            top: -20%;
            left: -20%;
            border-top-color: var(--gold);
            animation: spin 5s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
            position: relative;
            z-index: 10;
            filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.5));
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .brand-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(45deg, var(--primary), var(--secondary), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 4px;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
            animation: shimmer 3s infinite;
        }
        
        @keyframes shimmer {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }
        
        /* Motivational Quote */
        .quote-container {
            max-width: 800px;
            margin: 0 auto 50px;
            padding: 30px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .quote-text {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            line-height: 1.6;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .quote-text span {
            display: inline-block;
            opacity: 0;
            transform: translateY(20px);
            animation: typeIn 0.5s forwards;
        }
        
        @keyframes typeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .quote-author {
            text-align: right;
            margin-top: 15px;
            color: var(--gold);
            font-style: italic;
            font-size: 0.9rem;
        }
        
        /* Main Menu Grid */
        .main-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            max-width: 600px;
            margin: 0 auto 50px;
            padding: 0 20px;
        }
        
        .menu-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }
        
        .menu-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        
        .menu-card:hover::before {
            left: 100%;
        }
        
        .menu-card:nth-child(1) { border-color: var(--primary); }
        .menu-card:nth-child(2) { border-color: var(--secondary); }
        .menu-card:nth-child(3) { border-color: var(--gold); }
        .menu-card:nth-child(4) { border-color: var(--purple); }
        
        .menu-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        
        .menu-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .menu-card:nth-child(1) .menu-icon { color: var(--primary); }
        .menu-card:nth-child(2) .menu-icon { color: var(--secondary); }
        .menu-card:nth-child(3) .menu-icon { color: var(--gold); }
        .menu-card:nth-child(4) .menu-icon { color: var(--purple); }
        
        .menu-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .menu-desc {
            font-size: 0.8rem;
            opacity: 0.8;
        }
        
        /* Class Selection */
        .class-selection {
            display: none;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            animation: fadeIn 0.5s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 30px;
            padding: 10px 20px;
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(-5px);
        }
        
        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 30px;
            text-align: center;
            background: linear-gradient(45deg, var(--primary), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .class-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .class-card {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(131, 56, 236, 0.1));
            border: 2px solid var(--primary);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }
        
        .class-card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }
        
        .class-number {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }
        
        .class-label {
            font-size: 1.2rem;
            margin-top: 10px;
            font-weight: 600;
        }
        
        /* Subject Grid */
        .subject-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }
        
        .subject-card {
            background: var(--glass);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        
        .subject-card:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 190, 11, 0.2);
        }
        
        .subject-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .subject-name {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        
        .premium-badge {
            position: absolute;
            top: -10px;
            right: -10px;
            background: linear-gradient(45deg, var(--gold), var(--accent));
            color: black;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 5px 10px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(255, 190, 11, 0.4);
        }
        
        .free-badge {
            position: absolute;
            top: -10px;
            right: -10px;
            background: linear-gradient(45deg, #00ff88, #00d4ff);
            color: black;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 5px 10px;
            border-radius: 20px;
        }
        
        /* Content Section */
        .content-section {
            display: none;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            animation: fadeIn 0.5s;
        }
        
        .coming-soon {
            text-align: center;
            padding: 60px 20px;
            background: var(--glass);
            border-radius: 25px;
            border: 2px dashed rgba(255, 255, 255, 0.3);
        }
        
        .coming-soon-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: rotate 3s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .coming-soon h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            margin-bottom: 15px;
            color: var(--gold);
        }
        
        .coming-soon p {
            font-size: 1.1rem;
            opacity: 0.8;
        }
        
        /* Notifications */
        .notification-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .notification-card {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(255, 0, 110, 0.1));
            border-left: 4px solid var(--primary);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .notification-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .notification-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
        }
        
        .notification-date {
            font-size: 0.8rem;
            opacity: 0.7;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 10px;
            border-radius: 15px;
        }
        
        .notification-content {
            line-height: 1.6;
            opacity: 0.9;
        }
        
        /* Practice Test Styles */
        .test-container {
            background: var(--glass);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 30px;
        }
        
        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 30px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            width: 0%;
            transition: width 0.5s;
            border-radius: 10px;
        }
        
        .question-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .question-number {
            display: inline-block;
            background: var(--primary);
            color: black;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        
        .question-text {
            font-size: 1.2rem;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .option {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .option:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: var(--primary);
            transform: translateX(10px);
        }
        
        .option.selected {
            background: rgba(0, 212, 255, 0.2);
            border-color: var(--primary);
        }
        
        .option.correct {
            background: rgba(0, 255, 136, 0.2);
            border-color: #00ff88;
        }
        
        .option.wrong {
            background: rgba(255, 0, 110, 0.2);
            border-color: var(--secondary);
        }
        
        .option-marker {
            width: 30px;
            height: 30px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
        }
        
        .test-btn {
            background: linear-gradient(45deg, var(--primary), var(--purple));
            border: none;
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: block;
            margin: 30px auto 0;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }
        
        .test-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.4);
        }
        
        /* Results */
        .results-card {
            text-align: center;
            padding: 40px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(131, 56, 236, 0.1));
            border-radius: 25px;
            border: 2px solid var(--primary);
        }
        
        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: conic-gradient(var(--primary) calc(var(--score) * 1%), rgba(255, 255, 255, 0.1) 0);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            position: relative;
        }
        
        .score-circle::before {
            content: '';
            position: absolute;
            width: 120px;
            height: 120px;
            background: var(--dark);
            border-radius: 50%;
        }
        
        .score-text {
            position: relative;
            z-index: 1;
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
        }
